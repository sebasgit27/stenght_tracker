services:
  db:
    image: postgres:15-alpine
    container_name: garmin_strength_db
    restart: unless-stopped
    # Docker Compose lee automáticamente el archivo .env de la misma carpeta
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  # Esto crea un volumen persistente. Aunque borres el contenedor, 
  # los datos de tus entrenamientos no se perderán.
  postgres_data: